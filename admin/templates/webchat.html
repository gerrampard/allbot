{% extends "base.html" %}

{% block title %}Web对话 - AllBot管理后台{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- 单会话：聊天区域 -->
        <div class="col-12">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center" id="chat-header">
                    <h5 class="mb-0" id="current-session-title">Web 对话</h5>
                </div>
                <div class="card-body p-0">
                    <div class="chat-container" id="chat-container">
                        <div class="chat-messages" id="chat-messages">
                            <!-- 消息将在这里动态加载 -->
                            <div class="text-center text-muted py-5">
                                <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                                <p class="mt-3">输入消息开始对话</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <button class="btn btn-outline-secondary" type="button" id="upload-button" onclick="triggerFileUpload()" title="上传文件">
                            <i class="bi bi-paperclip"></i>
                        </button>
                        <input type="file" id="file-input" style="display:none" onchange="handleFileSelected(event)">
                        <input type="text" class="form-control" id="message-input" 
                               placeholder="输入消息..." 
                               onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button class="btn btn-primary" id="send-button" onclick="sendMessage()">
                            <i class="bi bi-send"></i> 发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.chat-container {
    height: 500px;
    overflow-y: auto;
    padding: 20px;
    background-color: #f8f9fa;
}

.chat-messages {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 10px;
    position: relative;
}

.message.user {
    align-self: flex-end;
    background-color: #007bff;
    color: white;
    margin-left: auto;
}

.message.bot {
    align-self: flex-start;
    background-color: #e9ecef;
    color: #333;
    margin-right: auto;
}

.message-time {
    font-size: 0.75rem;
    opacity: 0.7;
    margin-top: 5px;
}

.session-item {
    cursor: pointer;
    transition: background-color 0.2s;
}

.session-item:hover {
    background-color: #f8f9fa;
}

.session-item.active {
    background-color: #e7f1ff;
}

.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-radius: 50%;
    border-top-color: #007bff;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<script>
let currentSessionId = null;
let pollTimer = null;
let polling = false;
let sending = false;
let uploading = false;

let renderedMessageCount = 0;
let websocket = null;
let reconnectTimer = null;

const FIXED_SESSION_ID = 'webchat';

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    checkWebChatStatus();
    currentSessionId = FIXED_SESSION_ID;
    loadSessionMessages(currentSessionId);
    connectWebSocket();
    // 保留轮询作为备用，但降低频率
    startPolling(currentSessionId);
});

// WebSocket 连接管理
function connectWebSocket() {
    if (websocket && websocket.readyState === WebSocket.OPEN) {
        return;
    }

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/api/webchat/ws`;

    console.log('正在连接 WebSocket:', wsUrl);

    try {
        websocket = new WebSocket(wsUrl);

        websocket.onopen = function() {
            console.log('WebSocket 连接成功');
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        };

        websocket.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                console.log('收到 WebSocket 消息:', data);

                if (data.type === 'new_message') {
                    // 实时接收到新消息
                    if (data.session_id === currentSessionId) {
                        console.log('渲染实时消息:', data.message);
                        appendMessage(data.message);
                        renderedMessageCount++;
                        if (isNearBottom()) {
                            scrollToBottom();
                        }
                    }
                } else if (data.type === 'connected') {
                    console.log('WebSocket 握手成功:', data.message);
                } else if (data.type === 'heartbeat') {
                    // 心跳包，忽略
                }
            } catch (error) {
                console.error('处理 WebSocket 消息失败:', error);
            }
        };

        websocket.onerror = function(error) {
            console.error('WebSocket 错误:', error);
        };

        websocket.onclose = function() {
            console.log('WebSocket 连接关闭，5秒后重连');
            websocket = null;
            reconnectTimer = setTimeout(connectWebSocket, 5000);
        };
    } catch (error) {
        console.error('创建 WebSocket 连接失败:', error);
        reconnectTimer = setTimeout(connectWebSocket, 5000);
    }
}

function resetChatView() {
    stopPolling();
    currentSessionId = FIXED_SESSION_ID;
    document.getElementById('current-session-title').textContent = 'Web 对话';

    const chatMessages = document.getElementById('chat-messages');
    chatMessages.innerHTML = `
        <div class="text-center text-muted py-5">
            <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
            <p class="mt-3">输入消息开始对话</p>
        </div>
    `;
}

// 检查Web聊天状态
async function checkWebChatStatus() {
    try {
        const response = await fetch('/api/webchat/status');
        const result = await response.json();
        
        if (!result.success || !result.data.enabled) {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="text-center text-muted py-5">
                    <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: #dc3545;"></i>
                    <p class="mt-3 text-danger">Web适配器未启用</p>
                    <p>请先在适配器管理中启用Web适配器</p>
                </div>
            `;
            document.getElementById('message-input').disabled = true;
            document.getElementById('send-button').disabled = true;
            document.getElementById('upload-button').disabled = true;
            stopPolling();
        }
    } catch (error) {
        console.error('检查Web聊天状态失败:', error);
    }
}

// 加载会话消息
async function loadSessionMessages(sessionId) {
    try {
        const response = await fetch(`/api/webchat/sessions/${sessionId}`);
        const result = await response.json();

        console.log('加载会话消息响应:', result);

        if (result.success) {
            const chatMessages = document.getElementById('chat-messages');
            const messages = result.data.messages || [];

            console.log(`收到 ${messages.length} 条消息，当前已渲染 ${renderedMessageCount} 条`);

            const needFullRender = renderedMessageCount === 0 || messages.length < renderedMessageCount;
            const shouldScroll = isNearBottom();

            if (needFullRender) {
                chatMessages.innerHTML = '';
                renderedMessageCount = 0;

                if (messages.length === 0) {
                    chatMessages.innerHTML = '<div class="text-center text-muted py-3">暂无消息</div>';
                    return;
                }

                messages.forEach(msg => {
                    console.log('渲染消息:', msg);
                    appendMessage(msg);
                });
                renderedMessageCount = messages.length;
                scrollToBottom();
                return;
            }

            // 增量渲染新消息
            for (let i = renderedMessageCount; i < messages.length; i++) {
                console.log('渲染新消息:', messages[i]);
                appendMessage(messages[i]);
            }
            if (messages.length !== renderedMessageCount) {
                console.log(`新增 ${messages.length - renderedMessageCount} 条消息`);
                renderedMessageCount = messages.length;
                if (shouldScroll) {
                    scrollToBottom();
                }
            }
        } else {
            console.error('加载会话消息失败:', result.error);
        }
    } catch (error) {
        console.error('加载会话消息失败:', error);
    }
}

function startPolling(sessionId) {
    stopPolling();
    if (!sessionId) {
        return;
    }
    // 降低轮询频率到 10 秒，主要依赖 WebSocket
    pollTimer = setInterval(async () => {
        if (polling) {
            return;
        }
        if (currentSessionId !== sessionId) {
            stopPolling();
            return;
        }
        polling = true;
        try {
            await loadSessionMessages(sessionId);
        } finally {
            polling = false;
        }
    }, 10000);
}

function stopPolling() {
    if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
    }
    polling = false;
}

// 添加消息到聊天区域
function appendMessage(message) {
    const chatMessages = document.getElementById('chat-messages');
    const messageDiv = document.createElement('div');

    const role = message?.role || 'bot';
    const type = message?.type || 'text';
    const content = message?.content || '';
    const mediaUrl = message?.media_url || '';
    const filename = message?.filename || '';
    const timestamp = message?.timestamp || Math.floor(Date.now() / 1000);

    messageDiv.className = `message ${role}`;

    const body = document.createElement('div');

    if (type === 'image' && mediaUrl) {
        const img = document.createElement('img');
        img.src = mediaUrl;
        img.alt = filename || 'image';
        img.className = 'img-fluid rounded';
        img.style.maxWidth = '360px';
        body.appendChild(img);
        if (content && content !== filename) {
            const caption = document.createElement('div');
            caption.className = 'mt-2';
            caption.textContent = content;
            body.appendChild(caption);
        }
    } else if (type === 'video' && mediaUrl) {
        const video = document.createElement('video');
        video.controls = true;
        video.src = mediaUrl;
        video.style.maxWidth = '360px';
        video.className = 'rounded';
        body.appendChild(video);
    } else if (type === 'voice' && mediaUrl) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = mediaUrl;
        body.appendChild(audio);
    } else if (type === 'file' && mediaUrl) {
        const link = document.createElement('a');
        link.href = mediaUrl;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = filename || content || '下载文件';
        body.appendChild(link);
    } else {
        body.textContent = content;
    }

    const timeStr = new Date(timestamp * 1000).toLocaleTimeString();
    const timeDiv = document.createElement('div');
    timeDiv.className = 'message-time';
    timeDiv.textContent = timeStr;

    messageDiv.appendChild(body);
    messageDiv.appendChild(timeDiv);

    chatMessages.appendChild(messageDiv);
}

// 发送消息
async function sendMessage() {
    if (sending) {
        return;
    }
    if (uploading) {
        return;
    }
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    
    if (!content) {
        return;
    }
    
    currentSessionId = FIXED_SESSION_ID;
    
    const sendButton = document.getElementById('send-button');
    sendButton.disabled = true;
    sending = true;
    
    // 添加用户消息
    input.value = '';
    
    try {
        const response = await fetch('/api/webchat/send', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                content: content,
                session_id: currentSessionId,
                msg_type: 1
            })
        });
        
        const result = await response.json();

        if (result.success) {
            // 用户消息已发送，WebSocket 会推送机器人回复
            // 不需要立即轮询
        } else {
            alert('发送失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        console.error('发送消息失败:', error);
        alert('发送失败: ' + error.message);
    } finally {
        // 重新启用输入
        sendButton.disabled = false;
        sending = false;
        input.focus();
    }
}

function triggerFileUpload() {
    if (uploading || sending) {
        return;
    }
    currentSessionId = FIXED_SESSION_ID;
    const input = document.getElementById('file-input');
    if (input) {
        input.value = '';
        input.click();
    }
}

async function handleFileSelected(event) {
    const file = event?.target?.files?.[0];
    if (!file) {
        return;
    }
    await sendFile(file);
}

async function sendFile(file) {
    if (!file || uploading) {
        return;
    }
    currentSessionId = FIXED_SESSION_ID;

    const uploadButton = document.getElementById('upload-button');
    const sendButton = document.getElementById('send-button');
    uploadButton.disabled = true;
    sendButton.disabled = true;
    uploading = true;

    try {
        const form = new FormData();
        form.append('session_id', currentSessionId);
        form.append('file', file);

        const response = await fetch('/api/webchat/send_file', {
            method: 'POST',
            body: form
        });

        const result = await response.json();
        if (!result.success) {
            alert('上传失败: ' + (result.error || '未知错误'));
            return;
        }

        // 文件已上传，WebSocket 会推送机器人回复
    } catch (error) {
        console.error('上传文件失败:', error);
        alert('上传文件失败: ' + error.message);
    } finally {
        uploadButton.disabled = false;
        sendButton.disabled = false;
        uploading = false;
    }
}

// 滚动到底部
function scrollToBottom() {
    const chatContainer = document.getElementById('chat-container');
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function isNearBottom(thresholdPx = 48) {
    const chatContainer = document.getElementById('chat-container');
    return chatContainer.scrollTop + chatContainer.clientHeight >= chatContainer.scrollHeight - thresholdPx;
}

// HTML转义
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
