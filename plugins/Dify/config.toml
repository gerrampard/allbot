# ======================================
# Dify 插件主配置
# ======================================
[Dify]
# 基本设置
enable = true                  # 是否启用插件
default-model = "阿猪米德"           # 默认使用的模型
commands = []  # 触发命令列表

# 功能设置
support_agent_mode = true       # 是否支持Agent模式:
                                # true - 支持Agent模式，可以处理agent_thought、agent_message等事件
                                # false - 仅支持基础聊天模式

# 文件缓存设置
image_cache_timeout = 604800     # 图片缓存超时时间（秒），默认为1天
file_cache_timeout = 604800     # 文件缓存超时时间（秒），默认为7天
persistent_cache = true         # 是否使用持久化缓存，设为true则缓存在本地文件系统中保存

# 用户提示信息
command-tip = """-----"""

# 权限与积分设置
admin_ignore = true             # 管理员是否免积分，设为true则管理员不消耗积分使用AI
whitelist_ignore = true         # 白名单用户是否免积分，设为true则白名单用户不消耗积分

# 网络与回复设置
http-proxy = ""                 # HTTP代理配置，格式为"http://代理地址:端口"，不需要则留空
voice_reply_all = false         # 是否总是使用语音回复，设为true则所有回复都转为语音消息

# 机器人识别
robot-names = ["bot", "@bot"]
# 音频转文本和文本转音频 URL 将基于各模型的 base-url 自动构建

[Dify.models]
# 阿猪米德模型配置
[Dify.models."阿猪米德"]
api-key = "app- SMwXhFdZ9"
base-url = "http://sxkiss.top/v1"
trigger-words = ["@bot"]
wakeup-words = ["#"]
price = 0
