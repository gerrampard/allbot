[adapter]
name = "web"
enabled = true
module = "adapter.web"
class = "WebAdapter"
replyQueue = "allbot_reply:web"
replyMaxRetry = 3
replyRetryInterval = 2
logEnabled = true
logLevel = "INFO"

[web]
enable = true
platform = "web"
aliases = ["webchat"]
botWxid = ""
logRawMessage = true

[web.redis]
host = "127.0.0.1"
port = 6379
db = 0
password = ""
queue = "allbot"
