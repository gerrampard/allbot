services:
  allbot:
    image: sxkiss/allbot:latest
    pull_policy: always
    container_name: allbot
    restart: unless-stopped
    ports:
      - "9090:9090" # 管理后台端口
    volumes:
      - allbot:/app
      - redis_data:/data/redis # Redis数据持久化

volumes:
  allbot:
    name: allbot
  redis_data:
    name: redis_data
